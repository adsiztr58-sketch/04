<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotoğraflar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff9ecf,#ff4fa3);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
color:white;
margin-bottom:40px;
font-size:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:450px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

</style>
</head>

<body>

<h1>Fotoğraflarımız💖</h1>

<div class="gallery">

<img src="foto1.jpg.jpg">

<img src="foto2.jpg.jpg">

<img src="foto3.jpg.jpg">

</div>

</body>
</html>
